<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=./project-scope/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetterDay Project Scope</title>
<link rel="canonical" href="https://betterday-foodco.github.io/collab/project-scope/">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    background: #FAEBDA;
    color: #003141;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    text-align: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 40px 48px;
    box-shadow: 0 12px 32px rgba(0, 49, 65, 0.12);
    max-width: 460px;
  }
  .mark {
    width: 56px;
    height: 56px;
    background: #FFC600;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #003141;
    font-weight: 800;
    font-size: 22px;
    margin-bottom: 18px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
  }
  p {
    font-size: 14px;
    color: #475569;
    margin: 0 0 22px;
    line-height: 1.55;
  }
  a.btn {
    display: inline-block;
    background: #4EA2FD;
    color: white;
    font-weight: 700;
    font-size: 14px;
    padding: 12px 22px;
    border-radius: 100px;
    text-decoration: none;
    transition: background 0.15s;
  }
  a.btn:hover { background: #2f8be8; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">BD</div>
    <h1>BetterDay Project Scope</h1>
    <p>Redirecting you to the project scope dashboard…</p>
    <a class="btn" href="./project-scope/">Open dashboard →</a>
  </div>
  <script>window.location.replace("./project-scope/");</script>
</body>
</html>
